name: Deploy Portal

on:
  push:
    branches:
      - main
    paths:
      - "apps/portal/**"
      - ".github/workflows/deploy-portal.yml"
  workflow_dispatch:

concurrency:
  group: deploy-portal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/portal

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/portal/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Vercel CLI
        run: npm install -g vercel@54.17.2

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_IHWxUj2cbcDUdNNfcXE8BroH
          VERCEL_PROJECT_ID: prj_WaVDsv1bh3ZjUXbdaBRyhEwV5Hdi

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_IHWxUj2cbcDUdNNfcXE8BroH
          VERCEL_PROJECT_ID: prj_WaVDsv1bh3ZjUXbdaBRyhEwV5Hdi

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_IHWxUj2cbcDUdNNfcXE8BroH
          VERCEL_PROJECT_ID: prj_WaVDsv1bh3ZjUXbdaBRyhEwV5Hdi
